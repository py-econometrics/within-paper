<svg viewBox="0 0 480 300" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <rect width="480" height="300" fill="white" rx="4"/>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888"/>
    </marker>
  </defs>

  <!-- STAR OF W1 -->
  <text x="95" y="22" text-anchor="middle" font-size="12" fill="#555" font-weight="600">Star of W1 (degree 3)</text>

  <!-- Star edges -->
  <line x1="95" y1="120" x2="35"  y2="70" stroke="#d99" stroke-width="2"/>
  <line x1="95" y1="120" x2="155" y2="70" stroke="#d99" stroke-width="2"/>
  <line x1="95" y1="120" x2="95"  y2="190" stroke="#d99" stroke-width="2"/>

  <!-- W1 (highlighted: about to eliminate) -->
  <circle cx="95" cy="120" r="20" fill="#fda" stroke="#c44" stroke-width="2"/>
  <text x="95" y="126" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">W1</text>

  <!-- F1 -->
  <circle cx="35" cy="70" r="20" fill="#bbf" stroke="#555" stroke-width="1.5"/>
  <text x="35" y="76" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">F1</text>
  <!-- F2 -->
  <circle cx="155" cy="70" r="20" fill="#bbf" stroke="#555" stroke-width="1.5"/>
  <text x="155" y="76" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">F2</text>
  <!-- F3 -->
  <circle cx="95" cy="190" r="20" fill="#bbf" stroke="#555" stroke-width="1.5"/>
  <text x="95" y="196" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">F3</text>

  <!-- Arrow to exact -->
  <line x1="180" y1="100" x2="285" y2="58" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="222" y="68" text-anchor="middle" font-size="10" fill="#c44" font-style="italic">exact</text>

  <!-- Arrow to approx -->
  <line x1="180" y1="155" x2="285" y2="208" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="222" y="198" text-anchor="middle" font-size="10" fill="#4a4" font-style="italic">approx</text>

  <!-- EXACT: CLIQUE -->
  <text x="375" y="18" text-anchor="middle" font-size="11" fill="#c44" font-weight="600">Clique: d(d&#x2212;1)/2 = 3 fill edges</text>

  <!-- Clique edges (all 3) -->
  <line x1="315" y1="55" x2="435" y2="55" stroke="#c44" stroke-width="2.5"/>
  <line x1="315" y1="55" x2="375" y2="130" stroke="#c44" stroke-width="2.5"/>
  <line x1="435" y1="55" x2="375" y2="130" stroke="#c44" stroke-width="2.5"/>

  <!-- F1 -->
  <circle cx="315" cy="55" r="20" fill="#bbf" stroke="#555" stroke-width="1.5"/>
  <text x="315" y="61" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">F1</text>
  <!-- F2 -->
  <circle cx="435" cy="55" r="20" fill="#bbf" stroke="#555" stroke-width="1.5"/>
  <text x="435" y="61" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">F2</text>
  <!-- F3 -->
  <circle cx="375" cy="130" r="20" fill="#bbf" stroke="#555" stroke-width="1.5"/>
  <text x="375" y="136" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">F3</text>

  <!-- APPROX: TREE -->
  <text x="375" y="175" text-anchor="middle" font-size="11" fill="#4a4" font-weight="600">Tree: d&#x2212;1 = 2 fill edges</text>

  <!-- Tree edges: F1-F3 and F2-F3 (missing F1-F2) -->
  <line x1="315" y1="210" x2="375" y2="280" stroke="#4a4" stroke-width="2.5"/>
  <line x1="435" y1="210" x2="375" y2="280" stroke="#4a4" stroke-width="2.5"/>

  <!-- Missing edge shown as ghost -->
  <line x1="315" y1="210" x2="435" y2="210" stroke="#ddd" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- F1 -->
  <circle cx="315" cy="210" r="20" fill="#bbf" stroke="#555" stroke-width="1.5"/>
  <text x="315" y="216" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">F1</text>
  <!-- F2 -->
  <circle cx="435" cy="210" r="20" fill="#bbf" stroke="#555" stroke-width="1.5"/>
  <text x="435" y="216" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">F2</text>
  <!-- F3 -->
  <circle cx="375" cy="280" r="20" fill="#bbf" stroke="#555" stroke-width="1.5"/>
  <text x="375" y="286" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">F3</text>
</svg>
