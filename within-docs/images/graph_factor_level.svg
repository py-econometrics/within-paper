<svg viewBox="0 0 600 440" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <rect width="600" height="440" fill="white" rx="4"/>

  <!-- Factor-level subdomain boxes (non-overlapping) -->
  <rect x="70" y="40" width="460" height="80" rx="12"
        fill="rgba(255,153,255,0.12)" stroke="#c6c" stroke-width="2"/>
  <text x="545" y="84" font-size="12" fill="#c6c" font-weight="600">D_W</text>

  <rect x="150" y="180" width="300" height="80" rx="12"
        fill="rgba(170,170,255,0.12)" stroke="#88c" stroke-width="2"/>
  <text x="465" y="224" font-size="12" fill="#88c" font-weight="600">D_F</text>

  <rect x="150" y="320" width="300" height="80" rx="12"
        fill="rgba(255,255,130,0.15)" stroke="#cc0" stroke-width="2"/>
  <text x="465" y="364" font-size="12" fill="#bb0" font-weight="600">D_Y</text>

  <!-- Edges (all cross subdomain boundaries) -->
  <g stroke="#ccc" stroke-width="1.5" stroke-linecap="round">
    <line x1="120" y1="80" x2="200" y2="220"/>
    <line x1="120" y1="80" x2="400" y2="220"/>
    <line x1="300" y1="80" x2="200" y2="220"/>
    <line x1="480" y1="80" x2="400" y2="220"/>
    <line x1="120" y1="80" x2="200" y2="360"/>
    <line x1="120" y1="80" x2="400" y2="360"/>
    <line x1="300" y1="80" x2="200" y2="360"/>
    <line x1="300" y1="80" x2="400" y2="360"/>
    <line x1="480" y1="80" x2="200" y2="360"/>
    <line x1="480" y1="80" x2="400" y2="360"/>
    <line x1="200" y1="220" x2="200" y2="360"/>
    <line x1="200" y1="220" x2="400" y2="360"/>
    <line x1="400" y1="220" x2="200" y2="360"/>
    <line x1="400" y1="220" x2="400" y2="360"/>
  </g>

  <!-- Nodes -->
  <circle cx="120" cy="80" r="24" fill="#f9f" stroke="#555" stroke-width="2"/>
  <text x="120" y="86" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">W1</text>
  <circle cx="300" cy="80" r="24" fill="#f9f" stroke="#555" stroke-width="2"/>
  <text x="300" y="86" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">W2</text>
  <circle cx="480" cy="80" r="24" fill="#f9f" stroke="#555" stroke-width="2"/>
  <text x="480" y="86" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">W3</text>

  <circle cx="200" cy="220" r="24" fill="#bbf" stroke="#555" stroke-width="2"/>
  <text x="200" y="226" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">F1</text>
  <circle cx="400" cy="220" r="24" fill="#bbf" stroke="#555" stroke-width="2"/>
  <text x="400" y="226" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">F2</text>

  <circle cx="200" cy="360" r="24" fill="#ffa" stroke="#555" stroke-width="2"/>
  <text x="200" y="366" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Y1</text>
  <circle cx="400" cy="360" r="24" fill="#ffa" stroke="#555" stroke-width="2"/>
  <text x="400" y="366" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Y2</text>

  <!-- Caption -->
  <text x="300" y="428" text-anchor="middle" font-size="11" fill="#888">Every edge crosses a subdomain boundary — no internal edges.</text>
</svg>
