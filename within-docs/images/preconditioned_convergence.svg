<svg viewBox="0 0 480 280" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <rect width="480" height="280" fill="white" rx="4"/>

  <text x="240" y="22" text-anchor="middle" font-size="13" fill="#333" font-weight="600">Effect of preconditioning on convergence</text>

  <!-- Axes -->
  <line x1="60" y1="45" x2="60" y2="235" stroke="#999" stroke-width="1.5"/>
  <line x1="60" y1="235" x2="440" y2="235" stroke="#999" stroke-width="1.5"/>
  <text x="25" y="142" text-anchor="middle" font-size="11" fill="#888" transform="rotate(-90,25,142)">residual (log scale)</text>
  <text x="250" y="258" text-anchor="middle" font-size="11" fill="#888">iterations</text>

  <!-- Y-axis ticks (log scale markers) -->
  <text x="52" y="58" text-anchor="end" font-size="9" fill="#aaa">1</text>
  <line x1="55" y1="55" x2="60" y2="55" stroke="#aaa" stroke-width="1"/>
  <text x="52" y="103" text-anchor="end" font-size="9" fill="#aaa">10&#x207B;&#x00B2;</text>
  <line x1="55" y1="100" x2="60" y2="100" stroke="#aaa" stroke-width="1"/>
  <text x="52" y="148" text-anchor="end" font-size="9" fill="#aaa">10&#x207B;&#x2074;</text>
  <line x1="55" y1="145" x2="60" y2="145" stroke="#aaa" stroke-width="1"/>
  <text x="52" y="193" text-anchor="end" font-size="9" fill="#aaa">10&#x207B;&#x2076;</text>
  <line x1="55" y1="190" x2="60" y2="190" stroke="#aaa" stroke-width="1"/>

  <!-- Tolerance line -->
  <line x1="60" y1="210" x2="440" y2="210" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="445" y="214" font-size="9" fill="#aaa">tol = 10&#x207B;&#x2078;</text>

  <!-- Unpreconditioned (slow, many iterations) -->
  <polyline fill="none" stroke="#c55" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
    points="60,55 80,62 100,70 120,79 140,88 160,97 180,107 200,117 220,127 240,137 260,147 280,157 300,166 320,175 340,183 360,191 380,198 400,205 420,211"/>

  <!-- Preconditioned (fast, few iterations) -->
  <polyline fill="none" stroke="#4a9" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
    points="60,55 85,85 110,115 135,145 160,172 185,196 210,212"/>

  <!-- Legend -->
  <line x1="140" y1="270" x2="170" y2="270" stroke="#c55" stroke-width="2.5"/>
  <text x="175" y="274" font-size="10" fill="#555">Unpreconditioned (classical demeaning)</text>

  <line x1="140" y1="250" x2="170" y2="250" stroke="#4a9" stroke-width="2.5"/>
  <text x="175" y="254" font-size="10" fill="#555">Preconditioned (factor-pair Schwarz)</text>
</svg>
