[workspace]
authors = ["Alexander Fischer <alexander-fischer1801@t-online.de>"]
channels = ["conda-forge"]
name = "within-paper"
platforms = ["osx-arm64"]
version = "0.1.0"

[tasks]
compile = "typst compile main.typ main.pdf"

[dependencies]
typst = ">=0.14.2,<0.15"
r-base = ">=4.5.3,<4.6"
r-fixest = ">=0.14.1,<0.15"
r-arrow = ">=19.0.1,<20"
r-jsonlite = ">=2.0.0,<3"
python = ">=3.14.4,<3.15"

[pypi-dependencies]
pyfixest = "==0.50.1"
pyarrow = ">=19.0.0"
