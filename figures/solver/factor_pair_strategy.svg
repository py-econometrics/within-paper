<svg viewBox="0 0 640 430" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <rect width="640" height="430" fill="white"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <text x="320" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f2937">Build once from the fixed-effect graph</text>

  <rect x="58" y="54" width="150" height="68" rx="7" fill="#f8e8e8" stroke="#a66" stroke-width="1.8"/>
  <text x="133" y="80" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Worker-Firm</text>
  <text x="133" y="98" text-anchor="middle" font-size="10" fill="#666">local pair solve</text>

  <rect x="245" y="54" width="150" height="68" rx="7" fill="#f8e8e8" stroke="#a66" stroke-width="1.8"/>
  <text x="320" y="80" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Worker-Year</text>
  <text x="320" y="98" text-anchor="middle" font-size="10" fill="#666">local pair solve</text>

  <rect x="432" y="54" width="150" height="68" rx="7" fill="#f8e8e8" stroke="#a66" stroke-width="1.8"/>
  <text x="507" y="80" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Firm-Year</text>
  <text x="507" y="98" text-anchor="middle" font-size="10" fill="#666">local pair solve</text>

  <text x="320" y="145" text-anchor="middle" font-size="10" fill="#8a4f4f">independent factor-pair subproblems</text>

  <line x1="133" y1="122" x2="272" y2="176" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="320" y1="122" x2="320" y2="172" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="507" y1="122" x2="368" y2="176" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="170" y="176" width="300" height="82" rx="7" fill="#e8e8f8" stroke="#66a" stroke-width="1.9"/>
  <text x="320" y="204" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Schwarz Preconditioner</text>
  <text x="320" y="224" text-anchor="middle" font-size="11" fill="#555">combine local corrections with overlap weights</text>
  <text x="320" y="243" text-anchor="middle" font-size="10" fill="#777">stored and reused across right-hand sides</text>

  <line x1="320" y1="258" x2="320" y2="306" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="334" y="286" font-size="10" fill="#777">apply to residuals</text>

  <rect x="110" y="306" width="420" height="78" rx="7" fill="#e8f4e8" stroke="#6a6" stroke-width="1.9"/>
  <text x="320" y="334" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Krylov Solver</text>
  <text x="320" y="354" text-anchor="middle" font-size="11" fill="#555">iterates to the global fixed-effect solution</text>
  <text x="320" y="373" text-anchor="middle" font-size="10" fill="#777">repeat for y and each column of X</text>

  <path d="M 530 344 C 590 344 590 216 472 216" fill="none" stroke="#6b7280" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="590" y="284" text-anchor="middle" font-size="10" fill="#777">corrections</text>

  <text x="320" y="414" text-anchor="middle" font-size="12" fill="#6b7280">residualized outcome and covariates</text>
</svg>
